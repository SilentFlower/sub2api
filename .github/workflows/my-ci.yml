# =============================================================================
# 手动触发构建 - commit message 包含 [build] 时构建并推送镜像到 GHCR
# =============================================================================
name: Build Image

on:
  push:
    branches:
      - '**'

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check commit message for [build]
        id: check
        run: |
          MESSAGE="${{ github.event.head_commit.message }}"
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "build" ] || echo "$MESSAGE" | grep -qF '[build]'; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: check-trigger
    if: needs.check-trigger.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # 分支名-短 SHA (如: main-abc1234)
            type=raw,value={{branch}}-{{sha}},enable=true
            # 分支名-latest (如: main-latest)
            type=raw,value={{branch}}-latest,enable=true
            # 仅 main/master 分支打 latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/build' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
